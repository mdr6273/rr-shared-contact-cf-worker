# wrangler.toml — Cloudflare Worker deployment configuration
#
# This file tells Cloudflare Workers Builds how to deploy worker.js.
# It is committed to Git — do NOT put secret values in this file.
#
# DEPLOYMENT
# ----------
# This Worker deploys automatically via Cloudflare Workers Builds
# whenever a commit is pushed to the main branch of the connected
# GitHub repository. No manual Wrangler commands are needed.
#
# To deploy an update:
#   1. Edit worker.js (e.g. add/remove a customer in CUSTOMERS)
#   2. Commit the change in Git Desktop
#   3. Push to main — Cloudflare deploys automatically
#
# ADDING A NEW CUSTOMER
# ---------------------
# 1. Add an entry to the CUSTOMERS object in worker.js
# 2. Commit and push via Git Desktop
# 3. Add WAF Managed Challenge rule in customer's Cloudflare dashboard:
#      Expression: http.request.uri.path eq "/mailform"
#                  and http.request.method eq "POST"
#      Action: Managed Challenge
# 4. Add route www.customer.com/mailform → rr-shared-contact
#    in customer's Cloudflare dashboard
# 5. Point form action to https://www.customer.com/mailform
#    and confirm form submits as a traditional POST
#
# UPDATING THE SECRET
# -------------------
# The FORM_SECRET is set in the Cloudflare dashboard:
#   Workers & Pages → rr-shared-contact → Settings → Variables and Secrets
#
# To rotate the secret:
# 1. Generate a new secret and save to your password manager
# 2. Update .htaccess on Dreamhost FIRST with the new value
# 3. Update FORM_SECRET in the Cloudflare dashboard
# 4. Verify a test submission works
#
# WRANGLER DOCUMENTATION
# ----------------------
# https://developers.cloudflare.com/workers/wrangler/


# ============================================================
# WORKER IDENTITY
# ============================================================

# Worker name as it appears in the Cloudflare dashboard.
# Must match exactly — Workers Builds will fail if these differ.
name = "rr-shared-contact"

# Worker script entry point
main = "worker.js"

# Pins the Workers runtime behaviour to a specific date so that
# Cloudflare's future runtime changes don't silently break the Worker.
# Update this periodically when you review and redeploy.
# See: https://developers.cloudflare.com/workers/configuration/compatibility-dates/
compatibility_date = "2026-05-04"


# ============================================================
# ROUTING
# ============================================================

# Disable the automatic workers.dev public URL.
# This Worker is a private relay — it should only be reachable
# via the customer domain routes configured in the Cloudflare
# dashboard, not via a public workers.dev subdomain.
workers_dev = false

# Disable preview URLs for non-production branch builds.
preview_urls = false


# ============================================================
# SECRETS
# ============================================================
# Secrets are NOT defined here — they are set in the Cloudflare
# dashboard under:
#   Workers & Pages → rr-shared-contact → Settings → Variables and Secrets
#
# Do not add secret values to this file — it is committed to Git.
#
# Expected secrets:
#   FORM_SECRET — Shared secret sent in X-WAF-Secret header to PHP.
#                 Must match the value in .htaccess on Dreamhost.